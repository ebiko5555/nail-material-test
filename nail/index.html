<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#08090c">
  <meta name="description" content="カメラの手にネイル素材を重ねる試着作品。">
  <title>NAIL MATERIAL TEST</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js" crossorigin="anonymous"></script>
  <style>
    :root {
      --ink: #08090c;
      --paper: #f1f0ec;
      --mist: #b8dce7;
      --gold: #b9a06c;
      --rose: #c9a0ad;
      --violet: #9182af;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; height: 100%; background: var(--ink); color: var(--paper); overflow: hidden; }
    body { font-family: "Helvetica Neue", -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif; font-weight: 300; -webkit-tap-highlight-color: transparent; }
    button, a { color: inherit; font: inherit; }
    button { border: 0; }
    :focus-visible { outline: 1px solid var(--mist); outline-offset: 4px; }

    .camera-field { position: fixed; inset: 0; background: radial-gradient(circle at 50% 43%, #202329, #08090c 72%); }
    #output { display: block; width: 100%; height: 100%; object-fit: cover; touch-action: none; }
    #video { display: none; }
    .surface { position: absolute; inset: 0; pointer-events: none; background: linear-gradient(180deg, rgba(5,6,8,.48), transparent 24%, transparent 58%, rgba(5,6,8,.84)); }
    .surface::after { content: ""; position: absolute; inset: 0; opacity: .1; mix-blend-mode: soft-light; background-image: repeating-radial-gradient(circle at 18% 27%, rgba(255,255,255,.13) 0 1px, transparent 1px 6px); background-size: 89px 83px; }

    .topbar {
      position: absolute; z-index: 6; top: max(15px, env(safe-area-inset-top)); left: 16px; right: 16px;
      display: grid; grid-template-columns: 104px 1fr 44px; align-items: center;
    }
    .topbar a, .icon-button { height: 40px; display: grid; place-items: center; border: 1px solid rgba(255,255,255,.18); background: rgba(8,9,12,.5); backdrop-filter: blur(16px); text-decoration: none; }
    .topbar a { justify-self: start; padding: 0 13px; font: 500 9px/1 ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: .11em; }
    .icon-button { justify-self: end; width: 40px; border-radius: 50%; font-size: 15px; }
    .identity { text-align: center; pointer-events: none; }
    .identity strong { display: block; font: 500 8px/1.2 ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: .2em; }
    .identity span { display: block; margin-top: 5px; font-size: 7px; letter-spacing: .12em; color: rgba(255,255,255,.42); }

    .readout { position: absolute; z-index: 5; top: max(78px, calc(env(safe-area-inset-top) + 64px)); left: 18px; pointer-events: none; padding-left: 9px; border-left: 1px solid rgba(184,220,231,.42); }
    .readout span { display: block; font: 500 8px/1.7 ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: .16em; color: rgba(255,255,255,.45); }
    .readout b { color: var(--mist); font-weight: 500; }

    .material-dock {
      position: absolute; z-index: 7; left: 0; right: 0; bottom: 0;
      padding: 22px 0 max(17px, env(safe-area-inset-bottom));
      border-top: 1px solid rgba(255,255,255,.12);
      background: linear-gradient(180deg, rgba(8,9,12,.84), rgba(8,9,12,.98));
      backdrop-filter: blur(18px);
    }
    .dock-label { display: flex; justify-content: space-between; align-items: center; padding: 0 19px 15px; font: 500 8px/1 ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: .2em; color: rgba(255,255,255,.48); }
    .dock-label button { padding: 9px 12px; border: 1px solid rgba(255,255,255,.18); color: rgba(255,255,255,.78); background: transparent; font: inherit; letter-spacing: .15em; }
    .materials { display: grid; grid-auto-flow: column; grid-auto-columns: 64px; gap: 8px; overflow-x: auto; padding: 0 18px 8px; scroll-snap-type: x mandatory; scrollbar-width: none; }
    .materials::-webkit-scrollbar { display: none; }
    .material { position: relative; min-width: 0; padding: 0 0 9px; background: transparent; color: rgba(255,255,255,.5); scroll-snap-align: center; }
    .material::after { content: ""; position: absolute; left: 50%; bottom: 0; width: 0; height: 1px; background: var(--mist); transform: translateX(-50%); transition: width .3s ease; }
    .sample { position: relative; display: block; width: 36px; height: 56px; margin: 0 auto 10px; overflow: hidden; border: 1px solid rgba(255,255,255,.18); border-radius: 50% 50% 42% 42% / 24% 24% 14% 14%; transition: transform .35s cubic-bezier(.2,.8,.2,1), border-color .35s ease, box-shadow .35s ease; }
    .material:nth-child(2n) .sample { transform: translateY(3px); }
    .material:nth-child(3n) .sample { transform: translateY(-1px); }
    .material.active { color: rgba(255,255,255,.92); }
    .material.active::after { width: 28px; }
    .material.active .sample { transform: translateY(-4px); border-color: rgba(220,238,244,.72); box-shadow: 0 0 24px rgba(176,215,229,.16); }
    .material em { display: block; overflow: hidden; text-overflow: ellipsis; font: normal 500 7px/1.2 ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: .08em; white-space: nowrap; }
    .shell { background: radial-gradient(circle at 30% 20%, #fff, transparent 12%), linear-gradient(145deg, #9ac8d7, #e7bfd0 38%, #d8c98f 62%, #748ea5); }
    .graphite { background: radial-gradient(circle at 32% 24%, #999, transparent 9%), linear-gradient(155deg, #050607, #4d5357 48%, #111); }
    .gold { background: repeating-linear-gradient(112deg, #4a3a20 0 4px, #d3bd7b 5px 7px, #75613c 8px 11px); }
    .blue { background: radial-gradient(circle at 50% 28%, #c3edf4, transparent 8%), linear-gradient(#0b2739, #185e78 55%, #07131e); }
    .rose { background: radial-gradient(circle at 32% 22%, rgba(255,255,255,.7), transparent 11%), linear-gradient(160deg, rgba(229,179,194,.85), rgba(103,63,83,.84)); }
    .clear { background: linear-gradient(145deg, rgba(255,255,255,.48), rgba(180,210,221,.08) 45%, rgba(222,185,206,.22)); backdrop-filter: blur(4px); }

    .start-layer { position: fixed; z-index: 20; inset: 0; display: grid; align-items: end; background: #08090c; transition: opacity .85s ease, visibility .85s; }
    .start-layer.hidden { opacity: 0; visibility: hidden; }
    .start-image { position: absolute; inset: 0; width: 100%; height: 68%; object-fit: cover; object-position: 64% 50%; filter: saturate(.46) brightness(.48) contrast(1.12); opacity: .78; }
    .start-layer::after { content: ""; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(8,9,12,.05) 20%, #08090c 64%); }
    .start-back { position: absolute; z-index: 3; top: max(18px, env(safe-area-inset-top)); left: 18px; padding: 12px 13px; border: 1px solid rgba(255,255,255,.2); color: rgba(255,255,255,.82); background: rgba(8,9,12,.52); backdrop-filter: blur(14px); text-decoration: none; font: 500 9px/1 ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: .12em; }
    .start-content { position: relative; z-index: 2; width: 100%; padding: 0 22px max(28px, env(safe-area-inset-bottom)); text-align: left; }
    .start-content small { display: block; margin-bottom: 13px; font: 500 8px/1 ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: .24em; color: rgba(198,225,233,.68); }
    .start-content h1 { max-width: 8em; margin: 0; font: 500 clamp(39px, 12.5vw, 74px)/.85 "Helvetica Neue", sans-serif; letter-spacing: -.055em; }
    .start-content p { margin: 20px 0 0; max-width: 27em; font-size: 11px; line-height: 1.8; letter-spacing: .07em; color: rgba(255,255,255,.6); }
    .start-button { margin-top: 25px; width: min(100%, 360px); height: 52px; border: 1px solid rgba(214,232,238,.34); border-radius: 0; background: rgba(185,219,230,.08); color: rgba(255,255,255,.9); font: 500 10px/1 ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: .16em; backdrop-filter: blur(12px); }
    .start-button:active { transform: scale(.95); }
    .privacy { margin-top: 13px !important; font-size: 8px !important; color: rgba(255,255,255,.36) !important; }
    .error { min-height: 20px; margin-top: 13px; color: #e1b3b3; font-size: 10px; line-height: 1.6; }

    .captured { position: fixed; z-index: 30; inset: 0; display: grid; place-items: center; padding: 22px; background: rgba(5,6,8,.88); backdrop-filter: blur(18px); opacity: 0; visibility: hidden; transition: .35s ease; }
    .captured.open { opacity: 1; visibility: visible; }
    .capture-card { width: min(92vw, 520px); }
    .capture-card img { display: block; width: 100%; max-height: 68svh; object-fit: contain; border: 1px solid rgba(255,255,255,.12); }
    .capture-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    .capture-actions button, .capture-actions a { padding: 13px; border: 1px solid rgba(255,255,255,.15); background: #15181b; text-decoration: none; text-align: center; font-size: 10px; letter-spacing: .08em; }

    @media (min-width: 760px) {
      .material-dock { left: 50%; right: auto; width: min(680px, 84vw); transform: translateX(-50%); bottom: 18px; border: 1px solid rgba(255,255,255,.08); border-radius: 3px; padding-top: 22px; }
      .materials { grid-auto-columns: 90px; justify-content: center; }
      .readout { left: 6vw; }
    }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation: none !important; transition-duration: .15s !important; } }
  </style>
</head>
<body>
  <main class="camera-field">
    <video id="video" playsinline muted></video>
    <canvas id="output" aria-label="カメラに映る手へネイル素材を重ねる画面"></canvas>
    <div class="surface"></div>

    <header class="topbar">
      <a href="../index.html" aria-label="作品空間へ戻る">← 作品へ</a>
      <div class="identity"><strong>NAIL / MATERIAL</strong><span>LIVE CAMERA TEST</span></div>
      <button class="icon-button" id="flip" type="button" aria-label="カメラを切り替える">↻</button>
    </header>
    <div class="readout"><span>HAND <b id="hand-status">WAITING</b></span><span>MATERIAL <b id="material-status">SHELL</b></span></div>

    <section class="material-dock" aria-label="ネイル素材を選ぶ">
      <div class="dock-label"><span>MATERIAL</span><button id="capture" type="button">CAPTURE</button></div>
      <div class="materials">
        <button class="material active" data-material="shell" type="button"><span class="sample shell"></span><em>SHELL</em></button>
        <button class="material" data-material="graphite" type="button"><span class="sample graphite"></span><em>GRAPHITE</em></button>
        <button class="material" data-material="gold" type="button"><span class="sample gold"></span><em>TRACE GOLD</em></button>
        <button class="material" data-material="blue" type="button"><span class="sample blue"></span><em>BLUE VOID</em></button>
        <button class="material" data-material="rose" type="button"><span class="sample rose"></span><em>RAW PINK</em></button>
        <button class="material" data-material="clear" type="button"><span class="sample clear"></span><em>CLEAR SKIN</em></button>
      </div>
    </section>
  </main>

  <section class="start-layer" id="start-layer">
    <img class="start-image" src="../assets/hand-orb-02.png" alt="">
    <a class="start-back" href="../index.html">← 作品へ戻る</a>
    <div class="start-content">
      <small>LIVE CAMERA / MATERIAL 01—06</small>
      <h1>NAIL MATERIAL TEST</h1>
      <p>手全体を画面中央に映します。下の素材片を選ぶと、爪の上へ重なります。</p>
      <button class="start-button" id="start" type="button">カメラを起動</button>
      <p class="privacy">映像は端末内で処理され、送信・保存されません。</p>
      <div class="error" id="error" role="alert"></div>
    </div>
  </section>

  <div class="captured" id="captured" aria-hidden="true">
    <div class="capture-card"><img id="captured-image" alt="試着画面の記録"><div class="capture-actions"><button id="capture-close" type="button">戻る</button><a id="download" download="nail-material-test.png">画像を保存</a></div></div>
  </div>

  <script>
    const MP_CDN = 'https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/';
    const video = document.getElementById('video');
    const canvas = document.getElementById('output');
    const ctx = canvas.getContext('2d');
    const startLayer = document.getElementById('start-layer');
    const errorBox = document.getElementById('error');
    const handStatus = document.getElementById('hand-status');
    const materialStatus = document.getElementById('material-status');
    let stream = null, hands = null, landmarks = [], facing = 'user', running = false, busy = false, loopsStarted = false;
    let material = 'shell', lastDetect = 0, lastHandSeen = 0, ripples = [];
    const nailStates = Array.from({length: 5}, () => null);
    const tips = [4, 8, 12, 16, 20], bases = [3, 7, 11, 15, 19];

    function mirrored() { return facing === 'user'; }
    function point(lm) { return { x: (mirrored() ? 1 - lm.x : lm.x) * canvas.width, y: lm.y * canvas.height }; }

    function fitCanvas() {
      if (!video.videoWidth) return;
      if (canvas.width !== video.videoWidth || canvas.height !== video.videoHeight) { canvas.width = video.videoWidth; canvas.height = video.videoHeight; }
    }

    function updateLandmarks(nextHands) {
      const now = performance.now();
      if (!nextHands.length) {
        if (now - lastHandSeen > 320) {
          landmarks = [];
          nailStates.fill(null);
          handStatus.textContent = 'SEARCHING';
        }
        return;
      }
      lastHandSeen = now;
      const next = nextHands[0];
      if (!landmarks.length || landmarks[0].length !== next.length) {
        landmarks = [next.map(point => ({...point}))];
      } else {
        const previous = landmarks[0];
        landmarks = [next.map((point, index) => {
          const old = previous[index];
          const speed = Math.hypot(point.x - old.x, point.y - old.y, (point.z || 0) - (old.z || 0));
          const alpha = Math.min(.58, .18 + speed * 6.5);
          return {
            x: old.x + (point.x - old.x) * alpha,
            y: old.y + (point.y - old.y) * alpha,
            z: (old.z || 0) + ((point.z || 0) - (old.z || 0)) * alpha
          };
        })];
      }
      handStatus.textContent = '1 FOUND';
    }

    function smoothAngle(current, target, alpha) {
      let difference = target - current;
      while (difference > Math.PI) difference -= Math.PI * 2;
      while (difference < -Math.PI) difference += Math.PI * 2;
      return current + difference * alpha;
    }

    function nailPath(width, length) {
      ctx.beginPath();
      ctx.moveTo(-width * .48, length * .38);
      ctx.bezierCurveTo(-width * .54, length * .12, -width * .5, -length * .27, 0, -length * .52);
      ctx.bezierCurveTo(width * .5, -length * .27, width * .54, length * .12, width * .48, length * .38);
      ctx.quadraticCurveTo(0, length * .55, -width * .48, length * .38);
      ctx.closePath();
    }

    function paintMaterial(width, length, time) {
      const t = time * .001;
      if (material === 'shell') {
        const g = ctx.createLinearGradient(-width, -length, width, length);
        g.addColorStop(0, '#8fc5d5'); g.addColorStop(.32, '#e8c4d2'); g.addColorStop(.62, '#ddcd96'); g.addColorStop(1, '#718da4'); ctx.fillStyle = g; ctx.fill();
        ctx.globalAlpha = .35; ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.ellipse(-width*.16, -length*.24, width*.16, length*.24, -.4, 0, Math.PI*2); ctx.fill(); ctx.globalAlpha = 1;
      } else if (material === 'graphite') {
        const g = ctx.createLinearGradient(-width, 0, width, 0); g.addColorStop(0, '#08090a'); g.addColorStop(.48, '#636b70'); g.addColorStop(.62, '#17191b'); g.addColorStop(1, '#020303'); ctx.fillStyle = g; ctx.fill();
      } else if (material === 'gold') {
        ctx.fillStyle = '#6e5a30'; ctx.fill(); ctx.save(); nailPath(width, length); ctx.clip(); ctx.strokeStyle = '#d4bf7f'; ctx.lineWidth = Math.max(1, width*.08);
        for (let x=-width*1.5; x<width*1.5; x+=width*.22) { ctx.beginPath(); ctx.moveTo(x, length*.6); ctx.lineTo(x+width*.75, -length*.6); ctx.stroke(); } ctx.restore();
      } else if (material === 'blue') {
        const g = ctx.createRadialGradient(-width*.2,-length*.25,1,0,0,length); g.addColorStop(0,'#bcebf1'); g.addColorStop(.16,'#256f88'); g.addColorStop(.58,'#0a3046'); g.addColorStop(1,'#020a11'); ctx.fillStyle=g; ctx.fill();
      } else if (material === 'rose') {
        const g = ctx.createLinearGradient(-width,-length,width,length); g.addColorStop(0,'rgba(232,182,198,.92)'); g.addColorStop(.5,'rgba(153,90,116,.9)'); g.addColorStop(1,'rgba(62,36,54,.95)'); ctx.fillStyle=g; ctx.fill();
        ctx.globalAlpha=.22; ctx.fillStyle='#fff'; ctx.beginPath(); ctx.ellipse(-width*.18,-length*.24,width*.13,length*.27,-.35,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1;
      } else {
        ctx.fillStyle='rgba(224,237,241,.2)'; ctx.fill(); ctx.strokeStyle='rgba(237,249,252,.72)'; ctx.lineWidth=Math.max(1,width*.035); ctx.stroke();
      }
      nailPath(width, length); ctx.globalAlpha = .65; ctx.strokeStyle = material === 'gold' ? '#f2dfaa' : 'rgba(255,255,255,.75)'; ctx.lineWidth = Math.max(1, width*.025); ctx.stroke(); ctx.globalAlpha = 1;
    }

    function drawNails(time) {
      for (const hand of landmarks) {
        for (let i = 0; i < 5; i++) {
          const tip = point(hand[tips[i]]), base = point(hand[bases[i]]);
          const dx = tip.x - base.x, dy = tip.y - base.y, distance = Math.hypot(dx,dy);
          if (distance < 4) continue;
          const ux = dx/distance, uy = dy/distance;
          const target = {
            length: distance * (i === 0 ? 1.08 : 1.24),
            width: distance * (i === 0 ? .74 : .63),
            cx: tip.x + ux * distance * (i === 0 ? 1.08 : 1.24) * .16,
            cy: tip.y + uy * distance * (i === 0 ? 1.08 : 1.24) * .16,
            angle: Math.atan2(dy,dx) + Math.PI/2
          };
          if (!nailStates[i]) nailStates[i] = target;
          const state = nailStates[i];
          state.cx += (target.cx - state.cx) * .3;
          state.cy += (target.cy - state.cy) * .3;
          state.width += (target.width - state.width) * .22;
          state.length += (target.length - state.length) * .22;
          state.angle = smoothAngle(state.angle, target.angle, .28);
          const {cx, cy, width, length, angle} = state;
          ctx.save(); ctx.translate(cx,cy); ctx.rotate(angle);
          ctx.shadowColor = material === 'blue' ? 'rgba(95,205,236,.42)' : material === 'gold' ? 'rgba(222,195,120,.35)' : 'rgba(213,185,215,.28)';
          ctx.shadowBlur = width*.45; nailPath(width,length); paintMaterial(width,length,time); ctx.restore();
        }
      }
    }

    function drawRipples() {
      ripples = ripples.filter(r => r.life > .01);
      for (const r of ripples) { r.radius += 1.4; r.life *= .96; ctx.strokeStyle = `rgba(184,220,231,${r.life*.32})`; ctx.lineWidth = 1; ctx.beginPath(); ctx.arc(r.x,r.y,r.radius,0,Math.PI*2); ctx.stroke(); }
    }

    function draw(time=0) {
      if (!running) return;
      fitCanvas();
      ctx.save(); if (mirrored()) { ctx.translate(canvas.width,0); ctx.scale(-1,1); } ctx.drawImage(video,0,0,canvas.width,canvas.height); ctx.restore();
      const shade = ctx.createRadialGradient(canvas.width*.5,canvas.height*.45,0,canvas.width*.5,canvas.height*.45,canvas.width*.76); shade.addColorStop(.42,'rgba(5,7,9,0)'); shade.addColorStop(1,'rgba(5,7,9,.46)'); ctx.fillStyle=shade; ctx.fillRect(0,0,canvas.width,canvas.height);
      drawNails(time); drawRipples(); requestAnimationFrame(draw);
    }

    async function detect(time=0) {
      if (!running) return;
      if (!busy && video.readyState >= 2 && time-lastDetect > 70) { busy=true; lastDetect=time; try { await hands.send({image:video}); } catch(e) {} finally { busy=false; } }
      requestAnimationFrame(detect);
    }

    async function startCamera() {
      errorBox.textContent = '';
      if (!navigator.mediaDevices?.getUserMedia) { errorBox.textContent = '「連結版を開く.command」から開いてください。'; return; }
      try {
        if (!window.Hands) throw new Error('tracking');
        if (stream) stream.getTracks().forEach(track => track.stop());
        stream = await navigator.mediaDevices.getUserMedia({ video:{facingMode:facing,width:{ideal:1280},height:{ideal:720}}, audio:false });
        video.srcObject=stream; await video.play(); fitCanvas();
        if (!hands) { hands = new Hands({locateFile:file=>MP_CDN+file}); hands.setOptions({maxNumHands:1,modelComplexity:1,minDetectionConfidence:.7,minTrackingConfidence:.72}); hands.onResults(results=>updateLandmarks(results.multiHandLandmarks||[])); await hands.initialize(); }
        running=true; startLayer.classList.add('hidden');
        if (!loopsStarted) { loopsStarted = true; requestAnimationFrame(draw); requestAnimationFrame(detect); }
      } catch(error) { errorBox.textContent = location.protocol === 'file:' ? '「連結版を開く.command」から開いてください。' : 'カメラを開始できません。カメラ許可を確認してください。'; }
    }

    document.getElementById('start').addEventListener('click', startCamera);
    document.getElementById('flip').addEventListener('click', async()=>{ facing=facing==='user'?'environment':'user'; if(running) await startCamera(); });
    document.querySelectorAll('.material').forEach(button=>button.addEventListener('click',()=>{ document.querySelectorAll('.material').forEach(item=>item.classList.toggle('active',item===button)); material=button.dataset.material; materialStatus.textContent=button.querySelector('em').textContent; }));
    canvas.addEventListener('pointerdown',event=>{ const rect=canvas.getBoundingClientRect(); ripples.push({x:(event.clientX-rect.left)/rect.width*canvas.width,y:(event.clientY-rect.top)/rect.height*canvas.height,radius:8,life:1}); });
    document.getElementById('capture').addEventListener('click',()=>{ const url=canvas.toDataURL('image/png'); document.getElementById('captured-image').src=url; document.getElementById('download').href=url; document.getElementById('captured').classList.add('open'); document.getElementById('captured').setAttribute('aria-hidden','false'); });
    document.getElementById('capture-close').addEventListener('click',()=>{ document.getElementById('captured').classList.remove('open'); document.getElementById('captured').setAttribute('aria-hidden','true'); });
  </script>
</body>
</html>
